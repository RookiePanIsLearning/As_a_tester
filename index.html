<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試工程師知識庫</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            background: #fff;
            padding: 1rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        ul {
            list-style: none;
            padding: 0;
        }
        ul li {
            margin: 0.5rem 0;
        }
        ul li a {
            text-decoration: none;
            color: #333;
        }
        ul li a:hover {
            text-decoration: underline;
        }
        .search {
            margin-bottom: 1rem;
        }
        .search input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>測試工程師知識庫</h1>
    </header>
    <div class="container">
        <div class="search">
            <input type="text" id="search" placeholder="搜尋目錄..." onkeyup="filterList()">
        </div>
        <h2>目錄</h2>
        <ul id="directory">
            <li><a href="docs/01_Test_Strategy_and_Policies/README.md">01_Test_Strategy_and_Policies</a></li>
            <li><a href="docs/02_Testing_Methods_and_Theories/README.md">02_Testing_Methods_and_Theories</a></li>
            <li><a href="docs/03_Test_Case_Design_and_Repository/README.md">03_Test_Case_Design_and_Repository</a></li>
            <li><a href="docs/04_Skills_and_Heuristics/README.md">04_Skills_and_Heuristics</a></li>
            <li><a href="docs/05_Tools_Environment_and_Automation/README.md">05_Tools_Environment_and_Automation</a></li>
            <li><a href="docs/06_Reports_and_Metrics_Archive/README.md">06_Reports_and_Metrics_Archive</a></li>
        </ul>
    </div>
    <script>
        function filterList() {
            const searchInput = document.getElementById('search').value.toLowerCase();
            const items = document.querySelectorAll('#directory li');

            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(searchInput)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
